<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="User login." />
  <title>SACS - LOGIN</title>
  <link rel="stylesheet" href="00_Login.css">
  <script src="../CMN_JS/CMN_JS.js"></script>
  <script src="00_Login.js"></script> 
</head>
<body>

  <!-- Header Responsive -->
  <header class="login-header">
    <div class="icon-group">
      <img class="HeadIcon" alt="" src="../icone/IcoVoid_50x50.png">
      <img class="HeadIcon" alt="SACS Logo" src="../icone/IcoLogo_50x50.png">
    </div>
    <div class="header-title">SACS - LOGIN</div>
    <div class="icon-group">
      <a href="../Index.html" aria-label="Torna indietro">
        <img class="HeadIcon" alt="Indietro" src="../icone/IcoBack_50x50.png">
      </a>
      <img class="HeadIcon" alt="Ricarica" src="../icone/IcoReload_50x50.png" onclick="location.reload()">
    </div>
  </header>

  <!-- Contenitore Principale -->
  <main class="main-container">
    
    <img class="hero-image" alt="Mascotte" src="../icone/Goat01_250x250.png">

    <!-- Card Login -->
    <section class="login-card">
      <form onsubmit="event.preventDefault(); Validate('LOGIN_L');">
        <div class="form-group">
          <label for="ID_UID">Username</label>
          <input id="ID_UID" name="uname" type="text" placeholder="Enter Username" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="ID_PWD">Password</label>
          <input id="ID_PWD" name="pwd" type="password" placeholder="Enter Password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-submit">Login</button>
      </form>
    </section>

    <!-- Navigazione dei Servizi Secondari -->
    <nav class="services-grid" aria-label="Recupero credenziali e registrazione">
      <div class="service-box bg-coral">
        <a href="#" onclick="event.preventDefault(); Validate('UPR_U')">Utenza dimenticata</a>
      </div>
      <div class="service-box bg-yellow">
        <a href="#" onclick="event.preventDefault(); Validate('UPR_P')">Password dimenticata</a>
      </div>
      <div class="service-box bg-aqua">
        <a href="#" onclick="event.preventDefault(); Validate('UPR_R')">Mi registro</a>
      </div>
    </nav>

  </main>

</body>
</html>
